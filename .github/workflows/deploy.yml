name: Deploy Aurora Site (Develop)

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    env:
      IMAGE_NAME: aurora-site:develop
      CONTAINER_NAME: aurora-site-dev
      HOST_PORT: 3000
      TAR_NAME: aurora-site-dev.tar.gz
      ENV_PATH: /opt/aurora-site/.env

    steps:
      - name: Checkout code
        uses: appleboy/ssh-action@v1.0.3 # Pre-check to ensure dir exists
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: sudo mkdir -p /opt/aurora-site && sudo chmod 777 /opt/aurora-site

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Build .env file
        env:
          ENV_CONTENT: ${{ secrets.FRONTEND_DOTENV || secrets.ENV || vars.FRONTEND_DOTENV }}
        run: |
          if [ -z "$ENV_CONTENT" ]; then
            echo "Error: No environment variables found in secrets or vars."
            exit 1
          fi
          printf "%s" "$ENV_CONTENT" > .env.deploy
          printf "%s\n" "$ENV_CONTENT" | grep -E '^[[:space:]]*VITE_[A-Za-z0-9_]+=' > .env.production || true

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t ${{ env.IMAGE_NAME }} .

      - name: Save image to tar
        run: docker save ${{ env.IMAGE_NAME }} | gzip > ${{ env.TAR_NAME }}

      - name: Copy image and env to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "${{ env.TAR_NAME }},.env.deploy"
          target: "/tmp/"

      - name: Load and run on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            # 1. Prepare Docker
            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true
            docker rmi ${{ env.IMAGE_NAME }} || true
            docker load < /tmp/${{ env.TAR_NAME }}

            # 2. Setup Env
            mv /tmp/.env.deploy ${{ env.ENV_PATH }}
            chmod 600 ${{ env.ENV_PATH }}

            # 3. Run Container on Port 3000
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              --env-file ${{ env.ENV_PATH }} \
              -p ${{ env.HOST_PORT }}:3000 \
              ${{ env.IMAGE_NAME }}

            # 4. Fix Nginx (Ensure it is running and proxying to 3000)
            sudo systemctl start nginx || true
            sudo systemctl reload nginx || true

            # 5. Cleanup
            rm /tmp/${{ env.TAR_NAME }}
            docker image prune -f